{% extends "arva/base.html" %}
{% block title %}Access Denied{% endblock %}

{% block content %}
<div class="container my-5">
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4 p-md-5">
      <div class="d-flex align-items-start gap-3">
        <div class="text-danger fs-3"><i class="bi bi-shield-lock-fill"></i></div>
        <div>
          <h4 class="mb-2">Access Denied</h4>
          <p class="mb-2">{{ error|default:"You do not have permission to perform this action." }}</p>
          {% if details %}
          <p class="text-muted small mb-0">{{ details }}</p>
          {% endif %}
        </div>
      </div>
      <div class="mt-4">
        <a href="{% url 'project_list' %}" class="btn btn-primary btn-sm">Back to Projects</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
