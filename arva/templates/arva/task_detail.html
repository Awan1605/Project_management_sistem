{% extends "arva/base.html" %}
{% load static %}

{% block title %}{{ task.title }} - {{ project.name }}{% endblock %}

{% block content %}
<div class="container-fluid py-4">
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="{% url 'project_list' %}">Projects</a></li>
      <li class="breadcrumb-item"><a href="{% url 'project_detail' project.id %}">{{ project.name }}</a></li>
      <li class="breadcrumb-item active" aria-current="page">{{ task.title|truncatechars:40 }}</li>
    </ol>
  </nav>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0 fw-bold">
      <i class="bi bi-kanban me-2 text-primary"></i>Task Detail
    </h4>
    <a href="{% url 'project_detail' project.id %}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left me-1"></i>Back to Project
    </a>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      {% include "arva/_task_view.html" %}
    </div>
  </div>
</div>
{% endblock %}
