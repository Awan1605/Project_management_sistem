<div class="modal fade" id="resetPasswordModal" tabindex="-1">
  <div class="modal-dialog">
    <form class="modal-content" id="reset-password-form">
      <div class="modal-header">
        <h5 class="modal-title">Reset Password</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        {% csrf_token %}
        <input type="hidden" name="user_id" id="reset-password-user-id">
        <div class="mb-3">
          <label>New Password</label>
          <input name="password" type="password" class="form-control">
          <div class="invalid-feedback" data-field="password"></div>
        </div>
        <div class="mb-3">
          <label>Confirm Password</label>
          <input name="password_confirm" type="password" class="form-control">
          <div class="invalid-feedback" data-field="password_confirm"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button class="btn btn-primary" type="submit">Reset</button>
      </div>
    </form>
  </div>
</div>
