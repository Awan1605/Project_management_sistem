{% load socialaccount %}
{% load static %}
{% load arva_tags %}
{% get_settings as settings %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login – {{ settings.site_name }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #eef2f3, #dfe9f3);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Inter", sans-serif;
    }

    .login-card {
      border-radius: 18px;
      padding: 2rem;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      animation: fadeIn 0.5s ease;
    }

    .input-group-text {
      border-radius: 12px 0 0 12px;
      background: #f7f7f7;
      border: 1px solid #ddd;
    }

    .form-control {
      border-radius: 0 12px 12px 0;
      border-left: none;
      background: #fff;
      padding: 0.75rem;
    }

    .form-control:focus {
      box-shadow: none;
      border-color: #3e73ff;
    }

    .btn-primary {
      border-radius: 12px;
      padding: 0.75rem;
      font-weight: 600;
      background: #3e73ff;
      border: none;
    }

    .btn-primary:hover {
      background: #2d5ee6;
    }

    .btn-google {
      border-radius: 12px;
      padding: 0.7rem;
      font-weight: 500;
      border: 1px solid #ddd;
      background: #fff;
    }

    .btn-google:hover {
      background: #f5f5f5;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="login-card">

          <div class="text-center mb-4">
            {% if settings.logo %}
              <img src="{{ settings.logo_url }}" alt="Logo" class="img-fluid mb-2" style="max-height: 70px;">
            {% else %}
              <h3 class="fw-bold text-primary">{{ settings.site_name }}</h3>
            {% endif %}
          </div>

          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-person"></i>
                </span>
                <input type="text" name="username" class="form-control" placeholder="Username" required>
              </div>
            </div>
            <div class="mb-3">
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-lock"></i>
                </span>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
              </div>
            </div>

            <button class="btn btn-primary w-100 mb-3" type="submit">
              Login
            </button>

            <a href="{% provider_login_url 'google' %}" 
               class="btn btn-google w-100 d-flex align-items-center justify-content-center gap-2">
              <i class="bi bi-google"></i>
              Login with Google
            </a>
          </form>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
