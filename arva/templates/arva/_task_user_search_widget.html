<div class="task-user-search-widget {{ widget_class|default:'' }}" data-task-user-search-widget>
  <div class="task-user-search-input-wrap">
    <i class="bi bi-person-bounding-box"></i>
    <input
      type="text"
      class="task-user-search-input"
      placeholder="Search task by username/email"
      aria-label="Search tasks by user"
      autocomplete="off"
    >
  </div>
  <div class="task-user-search-results d-none" data-task-user-search-results></div>
</div>
