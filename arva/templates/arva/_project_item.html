<div class="col-md-4 col-sm-6" id="project-{{ project.id }}">
  <div class="card shadow-sm border-0 h-100 project-card" style="border-radius: 16px; transition: .25s;">

    <div class="card-body d-flex flex-column">

      <h5 class="card-title fw-semibold d-flex align-items-center mb-2">
        <i class="bi bi-folder-fill text-primary me-2"></i>
        {{ project.name }}
      </h5>
      <p class="text-muted flex-grow-1 mb-3" style="
           overflow: hidden;
           display: -webkit-box;
           -webkit-line-clamp: 2;
           -webkit-box-orient: vertical;
           font-size: .9rem;
         ">
        {{ project.description|default:"There is no description." }}
      </p>

      <div class="d-flex justify-content-between align-items-center mt-auto">

        <a href="{% url 'project_detail' project.id %}" class="btn btn-outline-primary btn-sm" style="border-radius: 10px; padding: 6px 10px;" title="Open Project">
          <i class="bi bi-box-arrow-in-right"></i> Open
        </a>

        <small class="text-muted d-flex align-items-center">
          <i class="bi bi-calendar-event me-1"></i>
          {{ project.created_at|date:"Y-m-d" }}
        </small>

      </div>

    </div>
  </div>
</div>
